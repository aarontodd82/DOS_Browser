# RetroSurf DOSBox-X Configuration
# NE2000 + SLIRP networking, VESA graphics

[sdl]
output=opengl
windowresolution=800x600

[dosbox]
machine=svga_s3
memsize=4

[cpu]
core=normal
cputype=486_slow
cycles=fixed 12000

[ne2000]
ne2000=true
nicbase=300
nicirq=10
macaddr=AC:DE:48:88:BB:AA
backend=slirp

[ethernet, slirp]
restricted=false
disable_host_loopback=false
ipv4_network=10.0.2.0
ipv4_netmask=255.255.255.0
ipv4_host=10.0.2.2
ipv4_nameserver=10.0.2.3
ipv4_dhcp_start=10.0.2.15

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5

[serial]
serial1=dummy
serial2=dummy
serial3=dummy
serial4=dummy

[dos]
xms=true
ems=true
umb=true

[autoexec]
@echo off
mount c "C:\Users\aaron\OneDrive\Documents\DOS_Browser\dos_client\build"
mount d "C:\Users\aaron\OneDrive\Documents\DOS_Browser\dos_client\drivers"
c:
SET WATTCP.CFG=C:\
SET BLASTER=A220 I7 D1 H5 T6
D:\NE2000.COM 0x60 10 0x300
echo.
echo RetroSurf DOS Environment Ready
echo   Server address: 10.0.2.2:8086
echo   Type RETRO to start
echo.
